<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastKhata Fixed</title>
    <style>
        :root { --orange-main: #f97316; --orange-deep: #ea580c; --red: #ef4444; --green: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff7ed; margin: 0; padding-bottom: 50px; color: #431407; }
        
        .top-section { background: linear-gradient(135deg, #fb923c, #ea580c); color: white; padding: 40px 20px 60px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .total-card { background: white; margin: -40px 20px 20px; padding: 20px; border-radius: 25px; display: flex; justify-content: space-around; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .search-box { width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid #fdba74; margin-bottom: 20px; outline: none; box-sizing: border-box; font-size: 16px; }

        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .clickable-name { cursor: pointer; color: var(--orange-deep); font-weight: bold; font-size: 18px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-baki { background: #fff1f2; color: var(--red); border: 1px solid #fecdd3; }
        .btn-jama { background: #f0fdf4; color: var(--green); border: 1px solid #bbf7d0; }
        .btn-wa { background: #25d366; color: white; width: 100%; padding: 12px; border-radius: 10px; border:none; font-weight:700; }

        /* Profile Modal */
        .profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff7ed; z-index: 3000; display: none; flex-direction: column; }
        .p-header { background: var(--orange-deep); color: white; padding: 25px; text-align: center; position: relative; }
        .ledger { flex: 1; overflow-y: auto; padding: 20px; background: white; border-radius: 30px 30px 0 0; }

        /* Input Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 85%; padding: 25px; border-radius: 25px; text-align: center; }
        
        .red { color: var(--red); } .green { color: var(--green); }
    </style>
</head>
<body>

<!-- Grahak Profile Screen -->
<div id="profileModal" class="profile-modal">
    <div class="p-header">
        <span onclick="closeProfile()" style="position:absolute; left:20px; font-size:24px;">←</span>
        <h2 id="pName">Grahak Name</h2>
        <p id="pPhone">Number</p>
    </div>
    <div style="display:flex; justify-content:space-around; padding:20px;">
        <div class="card" style="flex:1; margin:5px; text-align:center;">
            <small>BAKI</small><div id="pTotalBaki" class="red" style="font-size:20px; font-weight:900;">₹0</div>
        </div>
        <div class="card" style="flex:1; margin:5px; text-align:center;">
            <small>JAMA</small><div id="pTotalJama" class="green" style="font-size:20px; font-weight:900;">₹0</div>
        </div>
    </div>
    <div class="ledger">
        <h4>Pura Hisab</h4>
        <div id="pHistoryList"></div>
    </div>
</div>

<!-- Input Modal -->
<div id="customModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modalTitle">Kitna Amount?</h3>
        <input type="number" id="modalInput" style="width:100%; padding:15px; font-size:20px; border-radius:10px; border:1px solid #ccc; margin-bottom:10px;" placeholder="₹ Amount">
        <input type="text" id="modalNote" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ccc; margin-bottom:20px;" placeholder="Details (Jeans, Shirt...)">
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:12px; border:none; background:#eee; border-radius:10px;">Cancel</button>
            <button id="confirmBtn" style="flex:1; padding:12px; background:var(--orange-main); color:white; border-radius:10px; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="top-section">
    <h1 style="margin:0;">FastKhata</h1>
    <p>Apka Digital Khata</p>
</div>

<div class="total-card">
    <div style="text-align:center;"><span>KUL BAKI</span><div class="red" id="totalBaki" style="font-size:22px; font-weight:900;">₹0</div></div>
    <div style="text-align:center;"><span>KUL JAMA</span><div class="green" id="totalJama" style="font-size:22px; font-weight:900;">₹0</div></div>
</div>

<div class="container">
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search Grahak..." oninput="renderCustomers()">
    
    <!-- Add Grahak Card -->
    <div class="card" style="border: 2px dashed #fdba74; background: #fffaf5;">
        <input type="text" id="custName" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #fed7aa; box-sizing:border-box;" placeholder="Grahak ka Naam">
        <input type="number" id="custPhone" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #fed7aa; box-sizing:border-box;" placeholder="WhatsApp Number">
        <button onclick="addCustomer()" style="width:100%; background:var(--orange-main); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold; font-size:16px;">+ Save Grahak</button>
    </div>

    <div id="customerList"></div>
</div>

<script>
    // Data Loading with Protection
    let customers = [];
    try {
        const saved = localStorage.getItem('fastKhata_final_v6');
        if (saved) customers = JSON.parse(saved);
    } catch(e) { customers = []; }

    function saveData() {
        localStorage.setItem('fastKhata_final_v6', JSON.stringify(customers));
        renderCustomers();
    }

    // Add Customer Function
    function addCustomer() {
        const nameInput = document.getElementById('custName');
        const phoneInput = document.getElementById('custPhone');
        
        const name = nameInput.value.trim();
        const phone = phoneInput.value.trim();

        if (name === "") {
            alert("Kripya Grahak ka Naam bharein!");
            return;
        }

        const newCustomer = {
            id: Date.now(),
            name: name,
            phone: phone,
            balance: 0,
            history: []
        };

        customers.push(newCustomer);
        nameInput.value = "";
        phoneInput.value = "";
        saveData();
    }

    // Modal & Transaction Logic
    let currentId = null, currentType = '';
    function openModal(id, type) {
        currentId = id; currentType = type;
        document.getElementById('modalTitle').innerText = type==='baki'?'Kitna BAKI?':'Kitna JAMA?';
        document.getElementById('modalInput').value = '';
        document.getElementById('modalNote').value = '';
        document.getElementById('customModal').style.display='flex';
    }
    function closeModal() { document.getElementById('customModal').style.display='none'; }

    document.getElementById('confirmBtn').onclick = function() {
        const amt = parseFloat(document.getElementById('modalInput').value);
        const note = document.getElementById('modalNote').value.trim();
        if(!amt) return alert("Amount bharein!");

        const c = customers.find(cust => cust.id === currentId);
        const date = new Date().toLocaleString('hi-IN', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});

        if(currentType === 'baki') {
            c.balance += amt;
            c.history.unshift({type:'BAKI', amount:amt, date, note});
        } else {
            c.balance -= amt;
            c.history.unshift({type:'JAMA', amount:amt, date, note});
        }
        closeModal(); saveData();
        if(document.getElementById('profileModal').style.display==='flex') openProfile(currentId);
    };

    // Profile Display
    function openProfile(id) {
        const c = customers.find(cust => cust.id === id);
        document.getElementById('pName').innerText = c.name;
        document.getElementById('pPhone').innerText = "📞 " + (c.phone || "N/A");
        
        let totalJ = 0;
        c.history.forEach(h => { if(h.type==='JAMA') totalJ += h.amount; });
        
        document.getElementById('pTotalBaki').innerText = "₹" + Math.abs(c.balance);
        document.getElementById('pTotalJama').innerText = "₹" + totalJ;
        
        document.getElementById('pHistoryList').innerHTML = c.history.map(h => `
            <div style="border-bottom:1px solid #eee; padding:10px 0;">
                <div style="display:flex; justify-content:space-between;">
                    <small>${h.date}</small>
                    <b class="${h.type==='BAKI'?'red':'green'}">${h.type}: ₹${h.amount}</b>
                </div>
                <div style="font-size:14px; margin-top:3px;">${h.note || ''}</div>
            </div>
        `).join('') || "No History";
        document.getElementById('profileModal').style.display='flex';
    }
    function closeProfile() { document.getElementById('profileModal').style.display='none'; }

    // List Rendering
    function renderCustomers() {
        const listDiv = document.getElementById('customerList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        listDiv.innerHTML = "";
        let tBaki = 0, tJama = 0;

        customers.forEach(c => {
            if(c.balance > 0) tBaki += c.balance;
            else tJama += Math.abs(c.balance);

            if(!c.name.toLowerCase().includes(search)) return;

            let indJ = 0;
            c.history.forEach(h => { if(h.type==='JAMA') indJ += h.amount; });

            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div onclick="openProfile(${c.id})" class="clickable-name">${c.name}</div>
                    <div style="text-align:right;">
                        <div class="red" style="font-size:18px; font-weight:900;">₹${Math.abs(c.balance)}</div>
                        <small style="color:var(--green); font-weight:bold;">Jama: ₹${indJ}</small>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-baki" onclick="openModal(${c.id}, 'baki')">− BAKI</button>
                    <button class="btn btn-jama" onclick="openModal(${c.id}, 'jama')">+ JAMA</button>
                </div>
                <button class="btn-wa" onclick="window.open('https://wa.me/91${c.phone}?text=Namaste, Aapka balance ₹${Math.abs(c.balance)} BAKI hai.')">📱 WhatsApp</button>
                <div style="text-align:right; margin-top:10px;">
                    <button onclick="if(confirm('Delete?')){customers=customers.filter(cust=>cust.id!==${c.id});saveData();}" style="color:#ccc; border:none; background:none; font-size:10px;">Delete</button>
                </div>
            `;
            listDiv.appendChild(div);
        });
        document.getElementById('totalBaki').innerText = "₹" + tBaki;
        document.getElementById('totalJama').innerText = "₹" + tJama;
    }

    // Start App
    renderCustomers();
</script>
</body>
</html>
