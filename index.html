<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastKhata - Digital Business Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: linear-gradient(135deg, #FF8800 0%, #FF4400 100%);
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --green: #00c853;
            --red: #ff3d00;
            --bg: #fff5eb;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 136, 0, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 68, 0, 0.2) 0px, transparent 50%);
            margin: 0; padding: 0; min-height: 100vh;
        }

        /* Modern Glossy Header */
        .header {
            background: var(--primary);
            padding: 60px 20px 90px 20px;
            border-radius: 0 0 50px 50px;
            text-align: center;
            color: white;
            box-shadow: 0 15px 35px rgba(255, 68, 0, 0.25);
        }

        .header h1 { margin: 0; font-size: 36px; font-weight: 800; letter-spacing: -1.5px; }
        .header p { margin: 8px 0 0 0; opacity: 0.85; font-size: 15px; font-weight: 600; }

        /* Stats Section with Glass Effect */
        .stats-container {
            display: flex; gap: 15px;
            margin: -60px 20px 25px 20px;
        }

        .stat-card {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 22px 10px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }

        .stat-card h3 { margin: 0; font-size: 10px; color: #666; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        .stat-card p { margin: 10px 0 0 0; font-size: 20px; font-weight: 800; line-height: 1; }

        /* Main UI Container */
        .container { padding: 0 20px; }

        .search-glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 14px 22px;
            border-radius: 50px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 22px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.04);
        }

        .search-glass input {
            border: none; background: transparent; outline: none;
            width: 100%; font-size: 16px; color: #222; font-weight: 600;
        }

        .form-glass {
            background: rgba(255, 255, 255, 0.4);
            border: 1.5px dashed var(--glass-border);
            padding: 22px; border-radius: 30px; margin-bottom: 25px;
        }

        .form-glass input {
            width: 100%; padding: 15px; margin-bottom: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px; font-size: 14px; outline: none;
            font-weight: 600; transition: 0.3s;
        }
        
        .form-glass input:focus { border-color: #FF5500; background: white; }

        .btn-premium {
            background: var(--primary);
            color: white; border: none; width: 100%; padding: 16px;
            border-radius: 18px; font-weight: 800; font-size: 16px;
            box-shadow: 0 8px 25px rgba(255, 68, 0, 0.35);
            cursor: pointer; transition: 0.3s;
        }

        .btn-premium:active { transform: scale(0.97); }

        /* Customer List Glass Cards */
        .customer-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 22px; border-radius: 30px;
            margin-bottom: 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.04);
            transition: 0.3s;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .name-area h2 { margin: 0; font-size: 20px; font-weight: 800; color: #111; letter-spacing: -0.5px; }
        .name-area span { font-size: 13px; color: #777; font-weight: 600; display: block; margin-top: 4px; }

        .amount-area { text-align: right; }
        .baki-val { font-size: 24px; font-weight: 800; color: var(--red); display: block; }
        .jama-val { font-size: 14px; font-weight: 700; color: var(--green); margin-top: 2px; }

        .action-row { display: flex; gap: 12px; }
        .act-btn {
            flex: 1; padding: 14px; border-radius: 15px; border: none;
            font-weight: 700; font-size: 15px; cursor: pointer;
            transition: 0.2s;
        }
        .act-red { background: #fee7e7; color: var(--red); }
        .act-green { background: #e7fee7; color: var(--green); }

        .whatsapp-btn {
            background: #25D366; color: white;
            width: 100%; margin-top: 12px; padding: 14px;
            border-radius: 15px; border: none; font-weight: 800;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; font-size: 15px;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.2);
        }

        .delete-ico { color: #ccc; font-size: 16px; cursor: pointer; margin-left: 8px; transition: 0.3s; }
        .delete-ico:hover { color: var(--red); }

    </style>
</head>
<body>

<div class="header">
    <h1>FastKhata</h1>
    <p>Apka Digital Business Manager</p>
</div>

<div class="stats-container">
    <div class="stat-card">
        <h3>KUL BAKI</h3>
        <p style="color: var(--red);">₹ <span id="totalBaki">0</span></p>
    </div>
    <div class="stat-card">
        <h3>KUL JAMA</h3>
        <p style="color: var(--green);">₹ <span id="totalJama">0</span></p>
    </div>
</div>

<div class="container">
    <div class="search-glass">
        <i class="fa fa-search" style="color: #FF5500;"></i>
        <input type="text" id="searchInp" placeholder="Grahak ka naam dhoondhein..." oninput="render()">
    </div>

    <div class="form-glass">
        <input type="text" id="cusName" placeholder="Grahak ka Poora Naam">
        <input type="number" id="cusPhone" placeholder="WhatsApp Number">
        <button class="btn-premium" onclick="add()">+ Save Naya Grahak</button>
    </div>

    <div id="list"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('fastkhata_premium_db')) || [];

    function add() {
        const n = document.getElementById('cusName').value;
        const p = document.getElementById('cusPhone').value;
        if(!n) return alert("Naam zaroori hai!");
        data.push({ id: Date.now(), name: n, phone: p, baki: 0, jama: 0 });
        save();
        document.getElementById('cusName').value = '';
        document.getElementById('cusPhone').value = '';
    }

    function update(id, type) {
        const val = parseFloat(prompt("Kripya Amount (₹) daalein:"));
        if(isNaN(val) || val <= 0) return;
        const c = data.find(i => i.id === id);
        if(type === 'baki') c.baki += val;
        else c.jama += val;
        save();
    }

    function remove(id) {
        if(confirm("Kya aap is grahak ko hatana chahte hain?")) {
            data = data.filter(i => i.id !== id);
            save();
        }
    }

    function save() {
        localStorage.setItem('fastkhata_premium_db', JSON.stringify(data));
        render();
    }

    function render() {
        const query = document.getElementById('searchInp').value.toLowerCase();
        const box = document.getElementById('list');
        box.innerHTML = '';
        
        let totalBaki = 0;
        let totalJama = 0;

        // Har transaction ke baad total recalculate hoga
        data.forEach(c => {
            totalBaki += parseFloat(c.baki || 0);
            totalJama += parseFloat(c.jama || 0);

            if(c.name.toLowerCase().includes(query)) {
                const card = document.createElement('div');
                card.className = 'customer-card';
                card.innerHTML = `
                    <div class="card-top">
                        <div class="name-area">
                            <h2>${c.name} <i class="fa fa-trash-alt delete-ico" onclick="remove(${c.id})"></i></h2>
                            <span><i class="fa fa-phone-alt"></i> +91 ${c.phone || '----------'}</span>
                        </div>
                        <div class="amount-area">
                            <span class="baki-val">₹${c.baki}</span>
                            <span class="jama-val">Jama: ₹${c.jama}</span>
                        </div>
                    </div>
                    <div class="action-row">
                        <button class="act-btn act-red" onclick="update(${c.id}, 'baki')">- BAKI</button>
                        <button class="act-btn act-green" onclick="update(${c.id}, 'jama')">+ JAMA</button>
                    </div>
                    <a class="whatsapp-btn" href="https://wa.me/91${c.phone}?text=*FastKhata Update*%0A--------------------------%0ANamaste ${c.name},%0AAapka khata update ho gaya hai:%0A*Baki (Pending):* ₹${c.baki}%0A*Jama (Paid):* ₹${c.jama}%0A--------------------------%0ADhanyawad!" target="_blank">
                        <i class="fab fa-whatsapp"></i> WhatsApp Reminder
                    </a>
                `;
                box.appendChild(card);
            }
        });

        document.getElementById('totalBaki').innerText = totalBaki.toLocaleString('en-IN');
        document.getElementById('totalJama').innerText = totalJama.toLocaleString('en-IN');
    }

    window.onload = render;
</script>

</body>
</html>
