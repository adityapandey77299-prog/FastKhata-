<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastKhata - Kul Jama Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --orange-main: #f97316; 
            --orange-deep: #ea580c;
            --red: #ef4444; 
            --green: #10b981;
            --font-main: 'Poppins', sans-serif;
        }
        
        body { 
            font-family: var(--font-main); 
            background: #fff7ed; 
            margin: 0; padding-bottom: 50px; color: #1e293b;
        }

        .top-section { 
            background: linear-gradient(135deg, #fb923c, #ea580c); 
            color: white; padding: 40px 20px 60px; text-align: center; 
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }
        .top-section h1 { font-weight: 800; font-size: 26px; margin: 0; }

        .total-card { 
            background: white; margin: -40px 20px 20px; padding: 22px; 
            border-radius: 25px; display: flex; justify-content: space-around; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .total-item span { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; }
        .total-item div { font-size: 22px; font-weight: 800; }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        .search-box { 
            width: 100%; padding: 16px 25px; border-radius: 50px; 
            border: 2px solid #fdba74; margin-bottom: 25px; outline: none; 
            box-sizing: border-box; font-size: 16px; font-family: var(--font-main);
            background: white;
        }

        .card { 
            background: white; border-radius: 25px; padding: 20px; 
            margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }
        
        .cust-name { cursor: pointer; font-size: 19px; font-weight: 600; color: #1e293b; }
        .bal-amt { font-size: 24px; font-weight: 800; }
        .jama-tag { color: var(--green); font-size: 12px; font-weight: 600; margin-top: 5px; display: block; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .btn { border: none; padding: 14px; border-radius: 15px; font-weight: 600; cursor: pointer; font-family: var(--font-main); font-size: 14px; }
        .btn-baki { background: #fff1f2; color: var(--red); border: 1.5px solid #fecdd3; }
        .btn-jama { background: #f0fdf4; color: var(--green); border: 1.5px solid #bbf7d0; }
        
        .btn-wa { 
            background: #22c55e; color: white; width: 100%; padding: 15px; 
            border-radius: 18px; border:none; font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Ledger Modal */
        .history-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 3000; display: none;
            flex-direction: column; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .h-header { background: var(--orange-deep); color: white; padding: 30px 25px; text-align: center; position: relative; }
        .h-list { flex: 1; overflow-y: auto; padding: 25px; }

        /* Input Popups */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 85%; padding: 30px; border-radius: 30px; text-align: center; }
        .input-field { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1.5px solid #fed7aa; outline: none; box-sizing: border-box; font-family: var(--font-main); font-size: 16px; }

        .red { color: var(--red); } .green { color: var(--green); }
    </style>
</head>
<body>

<!-- History Ledger -->
<div id="historyModal" class="history-modal">
    <div class="h-header">
        <span onclick="closeHistory()" style="position:absolute; left:25px; font-size:24px; cursor:pointer;">←</span>
        <h2 id="hGrahakName" style="margin:0;">Grahak Name</h2>
        <p id="hGrahakPhone" style="margin:5px 0 0; opacity:0.8;">Number</p>
    </div>
    <div class="h-list" id="historyEntries"></div>
</div>

<!-- Transaction Entry Modal -->
<div id="txnModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="txnTitle" style="color:var(--orange-deep); margin-top:0;">Kitna Amount?</h3>
        <input type="number" id="txnAmount" class="input-field" style="font-size:24px; text-align:center; height:60px; font-weight:800;" placeholder="₹ 0">
        <input type="text" id="txnNote" class="input-field" placeholder="Kharidi detail (e.g. Jeans)">
        <div style="display:flex; gap:12px;">
            <button onclick="closeTxnModal()" style="flex:1; padding:14px; border:none; background:#f1f5f9; border-radius:12px; font-weight:600;">Cancel</button>
            <button id="txnConfirm" style="flex:1; padding:14px; background:var(--orange-main); color:white; border-radius:12px; font-weight:600;">Save</button>
        </div>
    </div>
</div>

<div class="top-section">
    <h1>India No. 1 Digital Khata App</h1>
</div>

<div class="total-card">
    <div style="text-align:center;"><span>KUL BAKI</span><div class="red" id="totalBaki">₹0</div></div>
    <div style="text-align:center;"><span>KUL JAMA</span><div class="green" id="totalJama">₹0</div></div>
</div>

<div class="container">
    <input type="text" id="search" class="search-box" placeholder="🔍 Grahak ka naam dhoondhe..." oninput="render()">

    <div class="card" style="border: 2px dashed #fdba74; background: #fffaf5; text-align: center;">
        <input type="text" id="nName" class="input-field" placeholder="Grahak ka Poora Naam">
        <input type="number" id="nPhone" class="input-field" placeholder="WhatsApp Number">
        <button onclick="addGrahak()" style="width:100%; background:var(--orange-main); color:white; border:none; padding:15px; border-radius:15px; font-weight:600; font-size:16px;">+ Save Naya Grahak</button>
    </div>

    <div id="grahakList"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('fastKhata_final_v10')) || [];

    function save() {
        localStorage.setItem('fastKhata_final_v10', JSON.stringify(data));
        render();
    }

    function addGrahak() {
        const name = document.getElementById('nName').value.trim();
        const phone = document.getElementById('nPhone').value.trim();
        if(!name) return alert("Naam bharein!");
        data.push({ id: Date.now(), name, phone, balance: 0, history: [] });
        document.getElementById('nName').value = '';
        document.getElementById('nPhone').value = '';
        save();
    }

    let activeId = null, activeType = '';
    function openTxn(id, type) {
        activeId = id; activeType = type;
        document.getElementById('txnTitle').innerText = type === 'baki' ? 'Kitna BAKI?' : 'Kitna JAMA?';
        document.getElementById('txnAmount').value = '';
        document.getElementById('txnNote').value = '';
        document.getElementById('txnModal').style.display = 'flex';
    }
    function closeTxnModal() { document.getElementById('txnModal').style.display = 'none'; }

    document.getElementById('txnConfirm').onclick = function() {
        const amt = parseFloat(document.getElementById('txnAmount').value);
        const note = document.getElementById('txnNote').value.trim();
        if(!amt) return;
        const g = data.find(x => x.id === activeId);
        const date = new Date().toLocaleString('hi-IN', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
        if(activeType === 'baki') {
            g.balance += amt;
            g.history.unshift({type: 'BAKI', amt, date, note});
        } else {
            g.balance -= amt;
            g.history.unshift({type: 'JAMA', amt, date, note});
        }
        closeTxnModal(); save();
    }

    function openHistory(id) {
        const g = data.find(x => x.id === id);
        document.getElementById('hGrahakName').innerText = g.name;
        document.getElementById('hGrahakPhone').innerText = "📞 +91 " + g.phone;
        document.getElementById('historyEntries').innerHTML = g.history.map(h => `
            <div style="padding:15px 0; border-bottom:1px solid #f1f5f9;">
                <div style="display:flex; justify-content:space-between; font-weight:600;">
                    <span style="color:#94a3b8; font-size:11px;">${h.date}</span>
                    <span class="${h.type==='BAKI'?'red':'green'}">${h.type}: ₹${h.amt}</span>
                </div>
                ${h.note ? `<div style="font-size:13px; color:#475569; margin-top:5px;">📄 ${h.note}</div>` : ''}
            </div>
        `).join('') || "<p style='text-align:center; padding:20px;'>No entry.</p>";
        document.getElementById('historyModal').style.display = 'flex';
    }
    function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }

    function render() {
        const list = document.getElementById('grahakList');
        const search = document.getElementById('search').value.toLowerCase();
        list.innerHTML = "";
        
        let kulBakiGlobal = 0;
        let kulJamaGlobal = 0;

        data.forEach(g => {
            // Calculate Global Totals
            if(g.balance > 0) kulBakiGlobal += g.balance;
            
            // Loop through all history to find TOTAL money received (JAMA)
            g.history.forEach(h => {
                if(h.type === 'JAMA') kulJamaGlobal += h.amt;
            });

            if(!g.name.toLowerCase().includes(search)) return;

            let indJ = 0; g.history.forEach(h => { if(h.type==='JAMA') indJ += h.amt; });

            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <div class="cust-name" onclick="openHistory(${g.id})">${g.name} 📋</div>
                        <div style="font-size:13px; color:#94a3b8; margin-top:4px;">+91 ${g.phone}</div>
                        <div style="font-size:11px; color:#94a3b8; font-style:italic;">Last: ${g.history.length > 0 ? g.history[0].type : 'N/A'}</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="bal-amt red">₹${Math.abs(g.balance)}</div>
                        <span class="jama-tag">Jama: ₹${indJ}</span>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-baki" onclick="openTxn(${g.id}, 'baki')">− BAKI</button>
                    <button class="btn btn-jama" onclick="openTxn(${g.id}, 'jama')">+ JAMA</button>
                </div>
                <button class="btn-wa" onclick="window.open('https://wa.me/91${g.phone}?text=Namaste, balance ₹${Math.abs(g.balance)} BAKI hai.')">
                    📱 WhatsApp Update
                </button>
                <div style="text-align:right; margin-top:15px;">
                    <span onclick="if(confirm('Delete?')){data=data.filter(x=>x.id!==${g.id});save();}" style="color:#cbd5e1; font-size:10px; cursor:pointer;">🗑️ DELETE</span>
                </div>
            `;
            list.appendChild(div);
        });

        document.getElementById('totalBaki').innerText = "₹" + kulBakiGlobal;
        document.getElementById('totalJama').innerText = "₹" + kulJamaGlobal;
    }

    render();
</script>
</body>
</html>
