<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastKhata - Professional Ledger</title>
    <style>
        :root { 
            --orange-main: #f97316; 
            --orange-deep: #ea580c;
            --red: #ef4444; 
            --green: #10b981;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #fff7ed; 
            margin: 0; padding-bottom: 50px; color: #431407;
        }

        /* Header */
        .top-section { 
            background: linear-gradient(135deg, #fb923c, #ea580c); 
            color: white; padding: 30px 20px 50px; text-align: center; 
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        .total-card { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            margin: -35px 20px 20px; padding: 20px; border-radius: 25px; 
            display: flex; justify-content: space-around; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        /* Search & Inputs */
        .search-box { width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid #fdba74; margin-bottom: 20px; outline: none; box-sizing: border-box; font-size: 16px; background: white; }
        .input-field { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #fed7aa; outline: none; box-sizing: border-box; font-size: 15px; }

        /* Grahak Card */
        .card { 
            background: white; border-radius: 25px; padding: 20px; 
            margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #fff;
        }
        .cust-name-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .clickable-name { cursor: pointer; font-size: 19px; font-weight: 800; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        .trash-btn { cursor: pointer; font-size: 16px; opacity: 0.3; }

        .bal-display { text-align: right; }
        .bal-amt { font-size: 24px; font-weight: 900; line-height: 1; }
        .jama-tag { color: var(--green); font-size: 12px; font-weight: bold; margin-top: 5px; display: block; }
        .last-tx { font-size: 11px; color: #94a3b8; font-style: italic; }

        /* Buttons */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .btn { border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 14px; }
        .btn-baki { background: #fff1f2; color: var(--red); border: 1px solid #fecdd3; }
        .btn-jama { background: #f0fdf4; color: var(--green); border: 1px solid #bbf7d0; }
        .btn-wa { background: #22c55e; color: white; width: 100%; padding: 14px; border-radius: 15px; border:none; font-weight:bold; font-size: 16px; box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3); }

        /* LEDGER MODAL (History Screen) */
        .history-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff7ed; z-index: 3000; display: none;
            flex-direction: column; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .h-header { background: var(--orange-deep); color: white; padding: 25px; text-align: center; }
        .h-stats { display: flex; justify-content: space-around; background: white; padding: 15px; margin: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .h-list { flex: 1; overflow-y: auto; padding: 20px; background: white; border-top-left-radius: 30px; border-top-right-radius: 30px; }
        .h-item { padding: 12px 0; border-bottom: 1px solid #f1f5f9; }

        /* Amount Input Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 85%; padding: 25px; border-radius: 30px; text-align: center; }
        
        .red { color: var(--red); } .green { color: var(--green); }
    </style>
</head>
<body>

<!-- History Modal (Open when tap on name) -->
<div id="historyModal" class="history-modal">
    <div class="h-header">
        <span onclick="closeHistory()" style="position:absolute; left:20px; font-size:24px; cursor:pointer;">←</span>
        <h2 id="hGrahakName" style="margin:0;">Raju</h2>
        <p id="hGrahakPhone" style="margin:5px 0 0; opacity:0.8;">+91 0000000000</p>
    </div>
    <div class="h-stats">
        <div><small style="color:#94a3b8">KUL BAKI</small><div id="hBaki" class="red" style="font-size:18px; font-weight:900;">₹0</div></div>
        <div><small style="color:#94a3b8">KUL JAMA</small><div id="hJama" class="green" style="font-size:18px; font-weight:900;">₹0</div></div>
    </div>
    <div class="h-list">
        <h4 style="margin-top:0; color:var(--orange-deep);">Pura Hisab (Ledger)</h4>
        <div id="historyEntries"></div>
    </div>
</div>

<!-- Add Baki/Jama Modal -->
<div id="txnModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="txnTitle" style="color:var(--orange-deep); margin-top:0;">Kitna Amount?</h3>
        <input type="number" id="txnAmount" class="input-field" style="font-size:24px; text-align:center; height:60px;" placeholder="₹ 0">
        <input type="text" id="txnNote" class="input-field" placeholder="Saman ki detail (e.g. Jeans, Shirt)">
        <div style="display:flex; gap:10px;">
            <button onclick="closeTxnModal()" style="flex:1; padding:12px; border:none; background:#f1f5f9; border-radius:12px;">Cancel</button>
            <button id="txnConfirm" style="flex:1; padding:12px; background:var(--orange-main); color:white; border-radius:12px; font-weight:bold;">Save Hisab</button>
        </div>
    </div>
</div>

<div class="top-section">
    <h2 style="margin:0;">India No. 1 Digital Khata App</h2>
</div>

<div class="total-card">
    <div style="text-align:center;"><span>KUL BAKI</span><div class="red" id="totalBaki">₹0</div></div>
    <div style="text-align:center;"><span>KUL JAMA</span><div class="green" id="totalJama">₹0</div></div>
</div>

<div class="container">
    <input type="text" id="search" class="search-box" placeholder="🔍 Grahak ka naam dhoondhe" oninput="render()">

    <!-- Add Grahak Form -->
    <div class="card" style="border: 2px dashed #fdba74; background: #fffaf5;">
        <input type="text" id="nName" class="input-field" placeholder="Grahak ka Poora Naam">
        <input type="number" id="nPhone" class="input-field" placeholder="WhatsApp Number">
        <button onclick="addGrahak()" class="btn" style="width:100%; background:var(--orange-main); color:white; font-size:16px;">+ Save Naya Grahak</button>
    </div>

    <div id="grahakList"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('fastKhata_v7')) || [];

    function save() {
        localStorage.setItem('fastKhata_v7', JSON.stringify(data));
        render();
    }

    function addGrahak() {
        const name = document.getElementById('nName').value.trim();
        const phone = document.getElementById('nPhone').value.trim();
        if(!name) return alert("Naam likhein!");
        data.push({ id: Date.now(), name, phone, balance: 0, history: [] });
        document.getElementById('nName').value = '';
        document.getElementById('nPhone').value = '';
        save();
    }

    let activeId = null, activeType = '';
    function openTxn(id, type) {
        activeId = id; activeType = type;
        document.getElementById('txnTitle').innerText = type === 'baki' ? 'Kitna BAKI (Diya)?' : 'Kitna JAMA (Mila)?';
        document.getElementById('txnAmount').value = '';
        document.getElementById('txnNote').value = '';
        document.getElementById('txnModal').style.display = 'flex';
    }
    function closeTxnModal() { document.getElementById('txnModal').style.display = 'none'; }

    document.getElementById('txnConfirm').onclick = function() {
        const amt = parseFloat(document.getElementById('txnAmount').value);
        const note = document.getElementById('txnNote').value.trim();
        if(!amt) return;

        const g = data.find(x => x.id === activeId);
        const date = new Date().toLocaleString('hi-IN', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});

        if(activeType === 'baki') {
            g.balance += amt;
            g.history.unshift({type: 'BAKI', amt, date, note});
        } else {
            g.balance -= amt;
            g.history.unshift({type: 'JAMA', amt, date, note});
        }
        closeTxnModal(); save();
    }

    function openHistory(id) {
        const g = data.find(x => x.id === id);
        document.getElementById('hGrahakName').innerText = g.name;
        document.getElementById('hGrahakPhone').innerText = "+91 " + g.phone;
        
        let totalJ = 0;
        g.history.forEach(h => { if(h.type === 'JAMA') totalJ += h.amt; });
        
        document.getElementById('hBaki').innerText = "₹" + Math.abs(g.balance);
        document.getElementById('hJama').innerText = "₹" + totalJ;

        document.getElementById('historyEntries').innerHTML = g.history.map(h => `
            <div class="h-item">
                <div style="display:flex; justify-content:space-between; font-weight:bold;">
                    <span style="color:#94a3b8; font-size:12px;">${h.date}</span>
                    <span class="${h.type==='BAKI'?'red':'green'}">${h.type}: ₹${h.amt}</span>
                </div>
                ${h.note ? `<div style="font-size:14px; margin-top:4px;">📄 ${h.note}</div>` : ''}
            </div>
        `).join('') || "<p style='text-align:center; color:#ccc;'>Koi entry nahi hai.</p>";

        document.getElementById('historyModal').style.display = 'flex';
    }
    function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }

    function deleteGrahak(id) {
        if(confirm("Grahak ko hatayein?")) {
            data = data.filter(x => x.id !== id);
            save();
        }
    }

    function render() {
        const list = document.getElementById('grahakList');
        const search = document.getElementById('search').value.toLowerCase();
        list.innerHTML = "";
        let kulB = 0, kulJ = 0;

        data.forEach(g => {
            if(g.balance > 0) kulB += g.balance;
            else kulJ += Math.abs(g.balance);

            if(!g.name.toLowerCase().includes(search)) return;

            let indJ = 0;
            g.history.forEach(h => { if(h.type==='JAMA') indJ += h.amt; });
            const lastType = g.history.length > 0 ? g.history[0].type : 'N/A';

            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <div class="cust-name-row">
                    <div>
                        <div class="clickable-name" onclick="openHistory(${g.id})">
                            ${g.name} <span class="trash-btn" onclick="event.stopPropagation(); deleteGrahak(${g.id})">🗑️</span>
                        </div>
                        <div style="font-size:13px; color:#94a3b8; margin-top:3px;">+91 ${g.phone}</div>
                        <div class="last-tx">Last: ${lastType}</div>
                    </div>
                    <div class="bal-display">
                        <div class="bal-amt red">₹${Math.abs(g.balance)}</div>
                        <span class="jama-tag">Jama: ₹${indJ}</span>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-baki" onclick="openTxn(${g.id}, 'baki')">− BAKI</button>
                    <button class="btn btn-jama" onclick="openTxn(${g.id}, 'jama')">+ JAMA</button>
                </div>
                <button class="btn-wa" onclick="window.open('https://wa.me/91${g.phone}?text=Namaste ${g.name}, Aapka balance ₹${Math.abs(g.balance)} BAKI hai.')">
                    <img src="https://cdn-icons-png.flaticon.com/512/124/124034.png" width="16" style="vertical-align:middle; margin-right:5px;"> WhatsApp Update
                </button>
            `;
            list.appendChild(div);
        });

        document.getElementById('totalBaki').innerText = "₹" + kulB;
        document.getElementById('totalJama').innerText = "₹" + kulJ;
    }

    render();
</script>
</body>
</html>
